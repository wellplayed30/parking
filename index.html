<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Парковка гостиницы</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <h1>🅿️ Парковка гостиницы</h1>
  </header>

  <!-- Легенда -->
  <div class="legend">
    <div><span class="dot free"></span> Свободно</div>
    <div><span class="dot reserved"></span> Забронировано</div>
    <div><span class="dot expired"></span> Бронь истекла</div>
    <div><span class="dot occupied"></span> Занято</div>
    <div><span class="dot electric"></span> ⚡ Электрозарядка</div>
    <div><span class="dot disabled"></span> ♿ Для инвалидов</div>
  </div>

  <!-- Схема парковки -->
  <div class="parking-wrapper">
    <div id="parking-top" class="parking-top"></div>
    <div id="parking-left" class="parking-left"></div>
  </div>

  <!-- Контейнер для раскрывающейся формы -->
  <div id="spot-form-container"></div>

  <script src="app.js"></script>
</body>
</html>
