<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Парковка гостиницы</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== ЭКРАН АВТОРИЗАЦИИ ===== -->
  <section id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <h1>🅿️ Парковка гостиницы</h1>
      <p class="subtitle">Войдите, чтобы продолжить</p>

      <form id="auth-form" class="auth-form">
        <input type="email" id="auth-email" placeholder="Email" required>
        <input type="password" id="auth-password" placeholder="Пароль" required>
        <button type="submit" class="btn-primary">Войти</button>
        <button type="button" id="google-login" class="btn-google">Войти через Google</button>
      </form>

      <p id="auth-error" class="auth-error"></p>
    </div>
  </section>

  <!-- ===== ОСНОВНОЙ ЭКРАН ===== -->
  <section id="main-screen" class="main-screen hidden">
    <header class="topbar">
      <h1>🅿️ Парковка гостиницы</h1>
      <button id="logout-btn" class="btn-logout">Выйти</button>
    </header>

    <div class="legend">
      <span class="legend-item"><span class="dot free"></span>Свободно</span>
      <span class="legend-item"><span class="dot busy"></span>Занято</span>
      <span class="legend-item"><span class="dot booked"></span>Бронь</span>
    </div>

    <div id="parking-grid" class="parking-grid"></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
