<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Парковка гостиницы</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Экран входа -->
<div id="login-screen">
  <h1>🅿️ Парковка гостиницы</h1>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Пароль">
  <button id="login-btn">Войти</button>
  <button id="google-btn">Войти через Google</button>
  <p id="login-error"></p>
</div>

<!-- Основной экран -->
<div id="main-screen" style="display:none;">
  <header>
    <h1>🅿️ Парковка</h1>
    <div class="header-right">
      <span id="user-info"></span>
      <span id="user-role"></span>
      <button id="logout-btn">Выйти</button>
    </div>
  </header>

  <div class="legend">
    <span><span class="dot free"></span> Свободно</span>
    <span><span class="dot busy"></span> Занято</span>
    <span><span class="dot expired"></span> Бронь истекла</span>
    <span><span class="dot special"></span> Спец. место</span>
  </div>

  <!-- Схема парковки -->
  <div id="parking-map">
    <!-- Верхний горизонтальный ряд (36-41) -->
    <div class="top-row">
      <div class="row-label">Верхний ряд</div>
      <div class="spots-horizontal" id="top-spots"></div>
    </div>

    <!-- Проезд -->
    <div class="driveway">
      <span>↑ ПРОЕЗД ↑</span>
    </div>

    <!-- Левый вертикальный ряд (1-34) -->
    <div class="left-row">
      <div class="row-label-vertical">Левый ряд</div>
      <div class="spots-vertical" id="left-spots"></div>
    </div>
  </div>
</div>

<!-- Модальное окно редактирования -->
<div id="modal" class="modal" style="display:none;">
  <div class="modal-content">
    <h2>Место №<span id="modal-spot-num"></span></h2>
    <label>Гость / номер машины:</label>
    <input type="text" id="modal-guest" placeholder="Иванов / А123БВ77">
    <label>Освободится (дата и время):</label>
    <input type="datetime-local" id="modal-until">
    <div class="modal-buttons">
      <button id="modal-save" class="btn-primary">💾 Сохранить</button>
      <button id="modal-free" class="btn-success">🟢 Освободить</button>
      <button id="modal-cancel" class="btn-secondary">Отмена</button>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
