<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Парковка гостиницы</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Экран входа -->
<div id="login-screen">
  <h1>🅿️ Парковка гостиницы</h1>
  <form id="login-form">
    <input type="email" id="email" placeholder="Email" autocomplete="email">
    <input type="password" id="password" placeholder="Пароль" autocomplete="current-password">
    <button type="submit" id="login-btn">Войти</button>
    <button type="button" id="google-btn">Войти через Google</button>
  </form>
  <p id="login-error"></p>
</div>

<!-- Основной экран -->
<div id="main-screen" style="display:none;">
  <header>
    <h1>🅿️ Парковка</h1>
    <div class="header-right">
      <span id="user-info"></span>
      <span id="user-role"></span>
      <button id="logout-btn">Выйти</button>
    </div>
  </header>

  <!-- Легенда -->
  <div class="legend">
    <div><span class="dot free"></span> Свободно</div>
    <div><span class="dot reserved"></span> Забронировано</div>
    <div><span class="dot expired"></span> Бронь истекла</div>
    <div><span class="dot occupied"></span> Занято</div>
  </div>

  <!-- Схема парковки -->
  <div class="parking-wrapper">
    <div class="parking-top" id="parking-top"></div>
    <div class="parking-left" id="parking-left"></div>
  </div>
</div>

<!-- Модальное окно -->
<div id="modal" class="modal-hidden">
  <div class="modal-content">
    <span class="close" id="close-modal">&times;</span>
    <h2 id="modal-title">Место №<span id="spot-number"></span></h2>
    <p>Статус: <strong id="spot-status"></strong></p>
    <div id="spot-info"></div>

    <div id="admin-controls">
      <label>№ апарта:
        <input type="text" id="apart-number" placeholder="Например: 101">
      </label>
      <label>Гос. номер:
        <input type="text" id="car-number" placeholder="А123БВ77">
      </label>
      <label>Дата и время брони:
        <input type="datetime-local" id="booking-datetime">
      </label>
      <label>Статус:
        <select id="status-select">
          <option value="free">Свободно</option>
          <option value="reserved">Забронировано</option>
          <option value="expired">Бронь истекла</option>
          <option value="occupied">Занято</option>
        </select>
      </label>
      <button id="save-btn">Сохранить</button>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
